<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>meeyota | Abyss</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: url('background.gif') no-repeat center center fixed;
            background-size: cover;
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 85%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            text-align: center;
        }

        /* Блок для видео и ника */
        .header-profile {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .profile-video {
            width: 70px;
            height: 70px;
            border-radius: 50%; /* Делает видео круглым */
            object-fit: cover; /* Чтобы видео не растягивалось */
            border: 2px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        h1 {
            font-size: 24px;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            text-decoration: none;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 18px;
            border-radius: 12px;
            font-weight: bold;
            letter-spacing: 2px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.1);
        }

        .music-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 3;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

<div class="music-toggle" onclick="toggleMusic()">
    <i id="music-icon" class="fas fa-music"></i>
</div>

<audio id="bg-music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <div class="header-profile">
        <video class="profile-video" autoplay loop muted playsinline>
            <source src="ebal.mp4" type="video/mp4">
        </video>
        <h1>meeyota</h1>
    </div>

    <div class="links">
        <a href="https://t.me/meeyota" class="btn">
            <i class="fab fa-telegram"></i> TELEGRAM
        </a>

        <a href="https://discord.com/users/meeyota" class="btn">
            <i class="fab fa-discord"></i> DISCORD
        </a>

        <a href="https://www.tbank.ru/cf/9djyHBOrrZH" class="btn">
            <i class="fas fa-coins"></i> DONATE
        </a>
    </div>
</div>

<script>
    const music = document.getElementById('bg-music');
    const icon = document.getElementById('music-icon');

    function toggleMusic() {
        if (music.paused) {
            music.play();
            icon.classList.remove('fa-music');
            icon.classList.add('fa-pause');
        } else {
            music.pause();
            icon.classList.remove('fa-pause');
            icon.classList.add('fa-music');
        }
    }
</script>

</body>
</html>
