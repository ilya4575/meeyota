<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>meeyota | Abyss</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #fff; }
        body {
            margin: 0; padding: 0;
            background: url('background.gif') no-repeat center center fixed;
            background-size: cover; background-color: #000;
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: 1;
        }

        /* Анимация появления контейнера */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            position: relative; z-index: 2; width: 85%; max-width: 360px;
            background: rgba(0, 0, 0, 0.75); padding: 30px; border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px);
            text-align: center; margin-bottom: 40px;
            animation: slideIn 1s ease-out; /* Запуск анимации */
        }

        .glitch {
            font-size: 26px; font-weight: bold; text-transform: uppercase;
            position: relative; letter-spacing: 5px; margin: 0; color: #fff;
        }
        
        .header { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .profile-vid { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; }

        .links { display: flex; flex-direction: column; gap: 15px; }
        
        .btn {
            text-decoration: none; color: white; background: rgba(255, 255, 255, 0.07);
            padding: 16px; border-radius: 12px; font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.1); 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        /* Общий эффект при наведении/нажатии */
        .btn:hover, .btn:active {
            transform: scale(1.05);
            color: #fff;
        }

        /* Цвета для каждой кнопки */
        .tg:hover, .tg:active { 
            background: #0088cc !important; 
            border-color: #0088cc; 
            box-shadow: 0 0 20px rgba(0, 136, 204, 0.5); 
        }
        .ds:hover, .ds:active { 
            background: #5865F2 !important; 
            border-color: #5865F2; 
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.5); 
        }
        .don:hover, .don:active { 
            background: #ffdd2d !important; 
            border-color: #ffdd2d; 
            color: #000; /* Черный текст на желтом фоне для читаемости */
            box-shadow: 0 0 20px rgba(255, 221, 45, 0.5); 
        }

        /* Нижний плеер */
        .music-player {
            position: fixed; bottom: -120px; left: 0; width: 100%;
            background: rgba(10, 10, 10, 0.98); backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px; box-sizing: border-box;
            transition: bottom 0.6s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100;
        }
        .music-player.active { bottom: 0; }
        
        .player-info { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 13px; letter-spacing: 1px; }
        .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; }
        .progress-bar { height: 100%; background: #fff; width: 0%; border-radius: 10px; }

        .play-trigger {
            position: absolute; top: 25px; right: 25px; z-index: 10;
            width: 45px; height: 45px; background: rgba(255,255,255,0.1);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.3); color: white; cursor: pointer;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .play-trigger:hover { transform: scale(1.1); background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

<div class="play-trigger" onclick="toggleMusic()">
    <i id="main-icon" class="fas fa-play"></i>
</div>

<audio id="audio" src="music.mp3" loop preload="auto"></audio>

<div class="container">
    <div class="header">
        <video class="profile-vid" autoplay loop muted playsinline>
            <source src="ebal.mp4" type="video/mp4">
        </video>
        <h1 class="glitch">meeyota</h1>
    </div>

    <div class="links">
        <a href="https://t.me/meeyota" class="btn tg">
            <i class="fab fa-telegram"></i> TELEGRAM
        </a>
        <a href="https://discord.com/users/meeyota" class="btn ds">
            <i class="fab fa-discord"></i> DISCORD
        </a>
        <a href="https://www.tbank.ru/cf/9djyHBOrrZH" class="btn don">
            <i class="fas fa-wallet"></i> DONATE
        </a>
    </div>
</div>

<div id="player-bar" class="music-player">
    <div class="player-info">
        <span><i class="fas fa-compact-disc fa-spin"></i> Ice Cube - It Was A Good Day</span>
        <span id="time">00:00</span>
    </div>
    <div class="progress-container">
        <div id="progress" class="progress-bar"></div>
    </div>
</div>

<script>
    const audio = document.getElementById('audio');
    const playerBar = document.getElementById('player-bar');
    const progressBar = document.getElementById('progress');
    const timeDisplay = document.getElementById('time');
    const mainIcon = document.getElementById('main-icon');

    function toggleMusic() {
        if (audio.paused) {
            audio.play();
            playerBar.classList.add('active');
            mainIcon.className = "fas fa-pause";
        } else {
            audio.pause();
            mainIcon.className = "fas fa-play";
        }
    }

    audio.addEventListener('timeupdate', () => {
        if (audio.duration) {
            const pct = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = pct + "%";
            let mins = Math.floor(audio.currentTime / 60);
            let secs = Math.floor(audio.currentTime % 60);
            timeDisplay.innerText = `${mins < 10 ? '0'+mins : mins}:${secs < 10 ? '0'+secs : secs}`;
        }
    });
</script>

</body>
</html>
