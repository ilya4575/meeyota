<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>meeyota | Abyss</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #fff; }
        body {
            margin: 0; padding: 0;
            background: url('background.gif') no-repeat center center fixed;
            background-size: cover; background-color: #000;
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: 1;
        }

        .container {
            position: relative; z-index: 2; width: 85%; max-width: 360px;
            background: rgba(0, 0, 0, 0.7); padding: 30px; border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px);
            text-align: center; margin-bottom: 80px; /* Место для плеера */
        }

        /* 1. Глитч эффект для ника */
        .glitch {
            font-size: 26px; font-weight: bold; text-transform: uppercase;
            position: relative; letter-spacing: 5px; margin: 0;
        }
        .glitch::before, .glitch::after {
            content: "meeyota"; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }
        .glitch::before {
            left: 2px; text-shadow: -2px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }
        .glitch::after {
            left: -2px; text-shadow: -2px 0 #00fff9;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            20% { clip: rect(62px, 9999px, 42px, 0); }
            100% { clip: rect(13px, 9999px, 86px, 0); }
        }
        @keyframes glitch-anim2 {
            0% { clip: rect(10px, 9999px, 65px, 0); }
            100% { clip: rect(80px, 9999px, 30px, 0); }
        }

        .header { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .profile-vid { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }

        .links { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            text-decoration: none; color: white; background: rgba(255, 255, 255, 0.05);
            padding: 16px; border-radius: 12px; font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.1); }

        /* 5. Счётчик посещений */
        .counter { margin-top: 20px; font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 2px; }

        /* Бар музыки внизу */
        .music-player {
            position: fixed; bottom: -100px; left: 0; width: 100%;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 20px; box-sizing: border-box;
            transition: bottom 0.5s ease; z-index: 100;
            display: flex; flex-direction: column; gap: 10px;
        }
        .music-player.active { bottom: 0; }
        
        .player-info { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; position: relative; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; border-radius: 2px; }

        .play-trigger {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            width: 40px; height: 40px; background: rgba(255,255,255,0.1);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

<div class="play-trigger" onclick="toggleMusic()"><i id="main-icon" class="fas fa-play"></i></div>

<audio id="audio" src="music.mp3" loop></audio>

<div class="container">
    <div class="header">
        <video class="profile-vid" autoplay loop muted playsinline>
            <source src="ebal.mp4" type="video/mp4">
        </video>
        <h1 class="glitch">meeyota</h1>
    </div>

    <div class="links">
        <a href="https://t.me/meeyota" class="btn"><i class="fab fa-telegram"></i> TELEGRAM</a>
        <a href="https://discord.com/users/meeyota" class="btn"><i class="fab fa-discord"></i> DISCORD</a>
        <a href="https://www.tbank.ru/cf/9djyHBOrrZH" class="btn"><i class="fas fa-wallet"></i> DONATE</a>
    </div>

    <div class="counter">
        VISITORS: <img src="https://counter.adfree.eu/count/meeyota" alt="counter" style="vertical-align: middle; filter: invert(1) opacity(0.5);">
    </div>
</div>

<div id="player-bar" class="music-player">
    <div class="player-info">
        <span><i class="fas fa-compact-disc fa-spin"></i> music.mp3</span>
        <span id="time">00:00</span>
    </div>
    <div class="progress-container">
        <div id="progress" class="progress-bar"></div>
    </div>
</div>

<script>
    const audio = document.getElementById('audio');
    const playerBar = document.getElementById('player-bar');
    const progressBar = document.getElementById('progress');
    const timeDisplay = document.getElementById('time');
    const mainIcon = document.getElementById('main-icon');

    function toggleMusic() {
        if (audio.paused) {
            audio.play();
            playerBar.classList.add('active');
            mainIcon.className = "fas fa-pause";
        } else {
            audio.pause();
            mainIcon.className = "fas fa-play";
        }
    }

    audio.ontimeupdate = function() {
        const pct = (audio.currentTime / audio.duration) * 100;
        progressBar.style.width = pct + "%";
        
        let mins = Math.floor(audio.currentTime / 60);
        let secs = Math.floor(audio.currentTime % 60);
        timeDisplay.innerText = (mins < 10 ? '0'+mins : mins) + ':' + (secs < 10 ? '0'+secs : secs);
    };
</script>

</body>
</html>
</div>

<script>
    const music = document.getElementById('bg-music');
    const icon = document.getElementById('music-icon');

    function toggleMusic() {
        if (music.paused) {
            music.play();
            icon.classList.remove('fa-music');
            icon.classList.add('fa-pause');
        } else {
            music.pause();
            icon.classList.remove('fa-pause');
            icon.classList.add('fa-music');
        }
    }
</script>

</body>
</html>
