<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>meeyota | Abyss</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0; padding: 0;
            background: url('background.gif') no-repeat center center fixed;
            background-size: cover; background-color: #000;
            color: white; font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }
        body::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 1; }

        /* Эффект сканера */
        .container::after {
            content: ""; position: absolute; top: -100%; left: 0; width: 100%; height: 20px;
            background: rgba(255, 255, 255, 0.03); animation: scan 4s linear infinite; pointer-events: none;
        }
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }

        .container {
            position: relative; z-index: 2; width: 90%; max-width: 360px;
            background: rgba(0, 0, 0, 0.85); padding: 30px; border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            text-align: center; overflow: hidden;
        }

        .profile-vid { width: 75px; height: 75px; border-radius: 50%; object-fit: cover; border: 2px solid #fff; margin-bottom: 10px; }
        .glitch { font-size: 26px; font-weight: bold; text-transform: uppercase; letter-spacing: 5px; text-shadow: 2px 0 #ff003c, -2px 0 #00fffc; }

        .links { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }
        .btn {
            text-decoration: none; color: white; background: rgba(255, 255, 255, 0.05);
            padding: 12px; border-radius: 12px; font-weight: bold; border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 13px;
            cursor: pointer;
        }
        .btn:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.4); }
        .tg:hover { background: #0088cc !important; box-shadow: 0 0 20px rgba(0, 136, 204, 0.4); }
        .ds:hover { background: #5865F2 !important; box-shadow: 0 0 20px rgba(88, 101, 242, 0.4); }
        .don:hover { background: #ffdd2d !important; color: #000 !important; box-shadow: 0 0 20px rgba(255, 221, 45, 0.4); }

        .system-info { background: rgba(255,255,255,0.03); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); text-align: left; }
        .stat-label { font-size: 10px; color: #666; display: flex; justify-content: space-between; margin-bottom: 5px; }
        .bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }
        .bar-fill { height: 100%; background: #4caf50; border-radius: 2px; width: 0%; transition: width 1s; }

        #visualizer { display: flex; justify-content: center; align-items: flex-end; gap: 3px; height: 35px; margin-top: 15px; }
        .v-bar { width: 4px; background: #ff003c; border-radius: 2px; height: 3px; transition: height 0.08s ease; }

        .player-bar { margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; display: flex; align-items: center; justify-content: space-between; }
        .p-btn { cursor: pointer; font-size: 20px; color: #ff003c; transition: 0.2s; }
        .track-info { font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: 1px; }
        #ping-val { font-size: 9px; color: #4caf50; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <video class="profile-vid" autoplay loop muted playsinline><source src="ebal.mp4" type="video/mp4"></video>
    <h1 class="glitch">meeyota</h1>

    <div class="links">
        <a href="https://t.me/meeyota" target="_blank" class="btn tg" onclick="playClick()"><i class="fab fa-telegram"></i> TELEGRAM</a>
        <a href="https://discord.com/users/meeyota" target="_blank" class="btn ds" onclick="playClick()"><i class="fab fa-discord"></i> DISCORD</a>
        <div class="btn don" onclick="handleDonate()"><i class="fas fa-wallet"></i> DONATE</div>
    </div>

    <div class="system-info">
        <div class="stat-label"><span>DEVICE BATTERY</span><span id="bat-val">--%</span></div>
        <div class="bar-bg"><div id="bat-fill" class="bar-fill"></div></div>
    </div>

    <div id="visualizer"></div>

    <div class="player-bar">
        <i class="fas fa-play p-btn" id="playBtn"></i>
        <div class="track-info">Ice Cube - Good Day</div>
        <div id="ping-val">PING: 24ms</div>
    </div>
</div>

<audio id="audio" src="music.mp3" crossorigin="anonymous" loop></audio>
<audio id="clickSound" src="click.mp3" preload="auto"></audio>

<script>
    const audio = document.getElementById('audio');
    const clickSound = document.getElementById('clickSound');
    const playBtn = document.getElementById('playBtn');
    const visualizer = document.getElementById('visualizer');

    // Звук клика
    function playClick() {
        clickSound.currentTime = 0;
        clickSound.volume = 0.5; // Громкость 50%
        clickSound.play();
    }

    // Логика доната
    function handleDonate() {
        playClick();
        const cardNumber = '2200701791728030';
        navigator.clipboard.writeText(cardNumber).then(() => {
            alert('Номер карты скопирован: ' + cardNumber);
            window.open("https://www.tbank.ru/rm/meeyota.abyss/transfer/", "_blank");
        });
    }

    // Эквалайзер
    for(let i=0; i<18; i++) {
        let bar = document.createElement('div');
        bar.className = 'v-bar';
        visualizer.appendChild(bar);
    }
    const bars = document.querySelectorAll('.v-bar');
    let audioCtx, analyser, dataArray;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaElementSource(audio);
            source.connect(analyser); analyser.connect(audioCtx.destination);
            analyser.fftSize = 64; dataArray = new Uint8Array(analyser.frequencyBinCount);
            renderFrame();
        }
    }

    function renderFrame() {
        requestAnimationFrame(renderFrame);
        analyser.getByteFrequencyData(dataArray);
        bars.forEach((bar, i) => {
            let h = (dataArray[i] / 255) * 35;
            bar.style.height = (h > 3 ? h : 3) + "px";
        });
    }

    playBtn.onclick = () => {
        playClick(); // Звук на кнопку плеера
        initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if(audio.paused) { audio.play(); playBtn.className = "fas fa-pause p-btn"; }
        else { audio.pause(); playBtn.className = "fas fa-play p-btn"; }
    };

    // Батарея
    if ('getBattery' in navigator) {
        navigator.getBattery().then(bat => {
            const update = () => {
                let l = Math.round(bat.level * 100);
                document.getElementById('bat-val').innerText = l + "%";
                document.getElementById('bat-fill').style.width = l + "%";
            };
            update(); bat.onlevelchange = update;
        });
    }

    // Пинг
    setInterval(() => {
        let p = Math.floor(Math.random() * (35 - 18) + 18);
        document.getElementById('ping-val').innerText = `PING: ${p}ms`;
    }, 2000);
</script>

</body>
</html>
